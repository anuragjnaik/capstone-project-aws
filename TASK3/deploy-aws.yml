---
- name: Deploy AWS Custom Page
  hosts: aws
  become: yes

  tasks:

    - name: Copy AWS page
      copy:
        src: index-aws.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
